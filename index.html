<!DOCTYPE html>


<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bat-Script [Armin]</title>
<style>
/* ===========================
   Animated Background
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        -45deg,
        #0f172a,
        #1e293b,
        #2563eb,
        #7c3aed,
        #0f172a
    );

    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
    overflow:hidden;
}

/* Floating blurred circles */

body::before,
body::after{
    content:"";
    position:fixed;
    width:450px;
    height:450px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.45;
    animation:float 10s ease-in-out infinite;
}

body::before{
    background:#3b82f6;
    top:-150px;
    left:-150px;
}

body::after{
    background:#8b5cf6;
    bottom:-150px;
    right:-150px;
    animation-delay:-5s;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes float{
    0%,100%{
        transform:translate(0,0);
    }
    50%{
        transform:translate(70px,-50px);
    }
}

/* ===========================
   Glass Card
=========================== */

.container{
    width:min(700px,90%);
    padding:45px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:24px;

    box-shadow:
        0 20px 60px rgba(0,0,0,.35);
}

/* ===========================
   Paragraph Style
=========================== */

p{
    color:white;

    font-size:1.1rem;

    line-height:1.9;

    letter-spacing:.4px;

    font-weight:400;

    text-shadow:
        0 2px 10px rgba(0,0,0,.35);

    animation:fadeUp .8s ease;
}

/* ===========================
   Better <br> spacing
=========================== */

br{
    display:block;
    content:"";
    margin:18px 0;
}

/* ===========================
   Animation
=========================== */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
